services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: oneshot
      POSTGRES_PASSWORD: oneshot
      POSTGRES_DB: oneshot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Create the test database on first start
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneshot"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
